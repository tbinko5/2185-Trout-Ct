<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2185 Trout Court — Naples, Florida</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --ink:#1E1B16;
    --paper:#F7F4EC;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html, body{
    height:100%;
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter', sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  .mono{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:28px 24px 44px;
    overflow:hidden;
    background:#2A3530; /* fallback while images load */
  }

  .hero-grid{
    position:absolute;
    inset:0;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-template-rows:repeat(4, 1fr);
    z-index:0;
  }
  .hero-grid img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    cursor:pointer;
  }

  .hero::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:1;
    background:linear-gradient(180deg, rgba(16,20,18,0.15) 0%, rgba(10,14,12,0.78) 100%);
    pointer-events:none;
  }

  .hero > *{ position:relative; z-index:2; }

  .hero-eyebrow{
    font-size:11px;
    opacity:0.85;
    margin-bottom:14px;
  }

  .hero h1{
    font-family:'Cambria', Georgia, serif;
    font-weight:400;
    font-optical-sizing:auto;
    font-size:clamp(36px, 8vw, 66px);
    line-height:1.02;
    max-width:14ch;
  }

  .hero-meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px 22px;
    margin-top:22px;
    font-size:12px;
  }
  .hero-meta span{ opacity:0.9; }

  .hero-stats{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:16px 24px;
    margin-top:28px;
    padding-top:20px;
    border-top:1px solid rgba(247,244,236,0.28);
  }
  @media(min-width:640px){
    .hero-stats{ grid-template-columns:repeat(4, 1fr); }
  }
  .hero-stats .label{
    font-size:10px;
    opacity:0.75;
    margin-bottom:4px;
  }
  .hero-stats .value{
    font-family:'Cambria', Georgia, serif;
    font-size:19px;
  }

  /* ---------- LIGHTBOX ---------- */
  .lightbox{
    position:fixed;
    inset:0;
    z-index:1000;
    background:#0B0F0D;
    display:none;
    align-items:center;
    justify-content:center;
  }
  .lightbox.active{ display:flex; }

  .lightbox img{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
  }

  .lightbox-back{
    position:absolute;
    top:20px;
    left:16px;
    width:46px;
    height:46px;
    border-radius:50%;
    background:rgba(30,27,22,0.55);
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:1001;
  }
  .lightbox-back svg{ width:22px; height:22px; }
  .lightbox-back:focus-visible{ outline:2px solid var(--paper); outline-offset:2px; }
</style>
</head>
<body>

  <section class="hero">
    <div class="hero-grid">
      <img src="1.jpg" alt="">
      <img src="2.jpg" alt="">
      <img src="3.jpg" alt="">
      <img src="4.jpg" alt="">
      <img src="5.jpg" alt="">
      <img src="6.jpg" alt="">
      <img src="7.jpg" alt="">
      <img src="8.jpg" alt="">
      <img src="9.jpg" alt="">
      <img src="10.jpg" alt="">
      <img src="11.jpg" alt="">
      <img src="12.jpg" alt="">
    </div>
    <div class="hero-eyebrow mono">For sale &middot; Private offering</div>
    <h1>2185 Trout Court</h1>
    <div class="hero-meta mono">
      <span>Naples, Florida</span>
    </div>
    <div class="hero-stats mono">
      <div class="stat">
        <div class="label">List price</div>
        <div class="value">$5,990,000</div>
      </div>
      <div class="stat">
        <div class="label">Canal frontage</div>
        <div class="value">294 LF</div>
      </div>
      <div class="stat">
        <div class="label">Lot size</div>
        <div class="value">0.57 acre</div>
      </div>
      <div class="stat">
        <div class="label">Beds / baths</div>
        <div class="value">3 / 2.5</div>
      </div>
    </div>
  </section>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-back" id="lightboxBack" aria-label="Back to gallery">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F7F4EC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/>
        <path d="M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <img id="lightboxImg" src="" alt="">
  </div>

<script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxBack = document.getElementById('lightboxBack');

  document.querySelectorAll('.hero-grid img').forEach(img => {
    img.addEventListener('click', () => {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightbox.classList.add('active');
    });
  });

  function closeLightbox(){
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  }

  lightboxBack.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
